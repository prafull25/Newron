version: '3.8'

services:
  # ─── Kafka Infrastructure ──────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: newron-zookeeper-prod
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: newron-kafka-prod
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  # ─── Databases ─────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: newron-postgres-prod
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: newrondb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "Pran25db@#"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d newrondb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: newron-redis-prod
    ports:
      - "6379:6379"

  # ─── Application Services ────────────────────────────────────────
  backend:
    build: ./backend
    container_name: newron-backend-prod
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - postgres
      - redis
    env_file: .env

  frontend:
    build: ./frontend
    container_name: newron-frontend-prod
    ports:
      - "3000:80"
    depends_on: 
      - backend

  # ─── Consumer Workers ──────────────────────────────────────────
  classifier-worker:
    build: ./backend
    container_name: newron-classifier-prod
    command: ["python", "-m", "kafka.consumers.classifier_consumer"]
    depends_on:
      - kafka
    env_file: .env

  ai-worker:
    build: ./backend
    container_name: newron-ai-prod
    command: ["python", "-m", "kafka.consumers.ai_consumer"]
    depends_on:
      - kafka
    env_file: .env

  notification-worker:
    build: ./backend
    container_name: newron-notification-prod
    command: ["python", "-m", "kafka.consumers.notification_consumer"]
    depends_on:
      - kafka
      - postgres
    env_file: .env

volumes:
  postgres_data_prod:
